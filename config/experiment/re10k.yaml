# @package _global_

defaults:
  - override /dataset: re10k
  - override /model/encoder: costvolume
  - override /loss: [mse, lpips, relheight]
wandb:
  name: re10k
  tags: [re10k, 256x256]

data_loader:
  train:
    batch_size: 14

trainer:
  max_steps: 300_001

# ----- Additional params for default best model customization
model:
  encoder:
    num_depth_candidates: 64
    costvolume_unet_feat_dim: 128
    costvolume_unet_channel_mult: [1,1,1]
    costvolume_unet_attn_res: [4]
    gaussians_per_pixel: 1
    depth_unet_feat_dim: 64
    depth_unet_attn_res: [16]
    depth_unet_channel_mult: [1,1,1,1,1]

loss:
  lpips:
    apply_after_step: 0
    weight: 0.05


dataset: 
  image_shape: [256, 256]
  roots: ['DatasetPath/']
  near: 1.
  far: 100.
  baseline_scale_bounds: false
  make_baseline_1: false

test:
  compute_scores: true
