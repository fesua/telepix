defaults:
  - dataset: re10k
  - optional dataset/view_sampler_dataset_specific_config: ${dataset/view_sampler}_${dataset}
  - model/encoder: costvolume
  - model/decoder: splatting_cuda
  - loss: [mse]

wandb:
  project: mvsplat
  entity: placeholder
  name: placeholder
  mode: offline
  id: null

mode: train

dataset:
  overfit_to_scene: null

data_loader:
  # Avoid having to spin up new processes to print out visualizations.
  train:
    num_workers: 8
    persistent_workers: false
    batch_size: 1
    seed: 1234
  test:
    num_workers: 4
    persistent_workers: false
    batch_size: 1
    seed: 2345
  val:
    num_workers: 4
    persistent_workers: false
    batch_size: 1
    seed: 3456
optimizer:
  lr: 2.e-4
  warm_up_steps: 2000
  cosine_lr: true

checkpointing:
  save_top_k: -1
  monitor: null
  mode: null
  every_n_train_steps: 10000
  dirpath: work_dirs
  filename: best_model
  pretrained_model: null
  resume: false
  load: null

train:
  depth_mode: null
  extended_visualization: false
  print_log_every_n_steps: 1

test:
  output_path: outputs/test
  compute_scores: false
  eval_time_skip_steps: 0
  save_image: true
  save_video: false


seed: 111123

trainer:
  max_steps: -1
  limit_val_batches: 0
  num_sanity_val_steps: 0
  num_nodes: 1
  check_val_every_n_epoch: null

output_dir: null
